description: JetBrains tools replace language server-based tools
prompt: |
  You have access to the very powerful JetBrains tools for symbolic operations.
  These partly replace regular tools you were informed about:
    * `jet_brains_find_symbol` replaces `find_symbol`
    * `jet_brains_find_referencing_symbols` replaces `find_referencing_symbols`
    * `jet_brains_get_symbols_overview` replaces `get_symbols_overview`
    * `jet_brains_rename` replaces `rename_symbol`
excluded_tools:
  - find_symbol
  - find_referencing_symbols
  - get_symbols_overview
  - restart_language_server
  - safe_delete_symbol
  - rename_symbol
  # Cursor tools depend on LSP graph edges; disabled under the JetBrains backend.
  - cursor_start
  - cursor_move
  - cursor_look
  - cursor_configure
  - cursor_history
  - cursor_close
  - cursor_find
  - cursor_overview
  - cursor_replace_body
  - cursor_insert_before
  - cursor_insert_after
  - cursor_rename
included_optional_tools:
  - jet_brains_find_declaration
  - jet_brains_find_implementations
  - jet_brains_find_referencing_symbols
  - jet_brains_find_symbol
  - jet_brains_get_symbols_overview
  - jet_brains_inline_symbol
  - jet_brains_move
  - jet_brains_type_hierarchy
  - jet_brains_rename
  - jet_brains_safe_delete
  - jet_brains_debug
  - serena_info
