# Minimal linker config for the synthetic CA65 test corpus.
# Mimics a simple C64-style memory layout but does not require c64.lib.
# Target: ld65 -C cfg/test_repo.cfg <objs> -o build/test_repo.prg

MEMORY {
    ZP:        start = $0002, size = $001A, type = rw, define = yes;
    HEADER:    start = $07FE, size = $0002, file = %O;
    MAIN:      start = $0801, size = $7700, file = %O;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,     type = zp;
    LOADADDR:  load = HEADER, type = ro,  optional = yes;
    STARTUP:   load = MAIN,   type = ro, define = yes;
    CODE:      load = MAIN,   type = ro;
    RODATA:    load = MAIN,   type = ro,  optional = yes;
    DATA:      load = MAIN,   type = rw,  optional = yes;
    BSS:       load = MAIN,   type = bss, define = yes;
}

FEATURES {
    CONDES: type = constructor,
            label = __CONSTRUCTOR_TABLE__,
            count = __CONSTRUCTOR_COUNT__,
            segment = RODATA;
}

SYMBOLS {
    __STACKSIZE__: type = weak, value = $0200;
}
