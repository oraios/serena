name: Parallel Matrix CI

on:
  push:
    branches:
      - feature/parallel-ci-workflows
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tirthpatel90/serena-maximal:latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - batch_name: 'Heavy Toolchains (C++, Rust, Java)'
            pytest_marker: '-m "cpp or rust or java"'
          
          - batch_name: 'Medium Toolchains (Go)'
            pytest_marker: '-m "go"'
          
          - batch_name: 'Catch-All (Core Framework & Remaining Languages)'
            pytest_marker: '-m "not cpp and not rust and not java and not go"'

    name: ${{ matrix.batch_name }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache language servers
        uses: actions/cache@v4
        with:
          path: ~/.serena/language_servers
          key: ls-cache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ls-cache-${{ runner.os }}-

      - name: Sync dependencies (with uv)
        run: |
          pip install uv
          uv pip install --system -r requirements.txt || echo "Dependencies synced"

      - name: Run Pytest Batch
        # Clean Pytest command to ensure it runs correctly in the container environment
        run: pytest ${{ matrix.pytest_marker }}