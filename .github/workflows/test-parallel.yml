name: Parallel Matrix CI

on:
  push:
    branches:
      - feature/parallel-ci-workflows
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parallel-tests:
    name: ${{ matrix.batch_name }}
    runs-on: ubuntu-latest
    
    container:
      image: ghcr.io/tirthpatel90/serena-maximal:latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - batch_name: 'Heavy Toolchains (C++, Rust, Java)'
            pytest_marker: '-m "cpp or rust or java"'
          
          - batch_name: 'Medium Toolchains (Go)'
            pytest_marker: '-m "go"'
          
          - batch_name: 'Catch-All (Core Framework & Remaining Languages)'
            # Excluded julia (hangs), missing/crashing tools: haskell, swift, lean4, zig, ocaml, csharp, markdown, perl, ruby, nix, pascal, al, ansible
            pytest_marker: '-m "not cpp and not rust and not java and not go and not julia and not haskell and not swift and not lean4 and not zig and not ocaml and not csharp and not markdown and not perl and not ruby and not nix and not pascal and not al and not ansible"'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Language Servers
        uses: actions/cache@v4
        with:
          path: ~/.serena/language_servers
          key: ${{ runner.os }}-serena-lang-servers-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-serena-lang-servers-

      - name: Quick Workspace Sync
        shell: bash
        run: |
          uv sync --extra dev --locked
          uv pip list

      - name: Run Pytest Batch
        shell: bash
        run: uv run poe test -q --tb=short ${{ matrix.pytest_marker }}