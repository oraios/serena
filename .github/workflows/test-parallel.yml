name: Parallel Matrix CI

on:
  push:
    branches:
      - feature/parallel-ci-workflows
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tirthpatel90/serena-maximal:latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - batch_name: "Heavy Toolchains (C++, Rust, Java)"
            marker_expr: 'cpp or rust or java'

          - batch_name: "Medium Toolchains (Go)"
            marker_expr: 'go'

          - batch_name: "Catch-All (Core Framework & Remaining Languages)"
            marker_expr: 'not cpp and not rust and not java and not go and not elm and not r and not rego and not scala'

    name: ${{ matrix.batch_name }}

    env:
      UV_LINK_MODE: copy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache language servers
        uses: actions/cache@v4
        with:
          path: ~/.serena/language_servers
          key: ls-cache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ls-cache-${{ runner.os }}-

      - name: Setup uv (Fast Python Package Manager)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Create venv + bootstrap pip + install deps
        shell: bash
        run: |
          set -euxo pipefail

          uv venv .venv

          .venv/bin/python -m ensurepip --upgrade || true
          .venv/bin/python -m pip install -U pip setuptools wheel

          uv pip install -e ".[dev]"

          .venv/bin/python -V
          .venv/bin/python -m pip -V
          .venv/bin/python -m pytest --version

      - name: Compute Catch-All marker expression (skip broken toolchains)
        id: markers
        shell: bash
        run: |
          set -euo pipefail

          MARKERS='${{ matrix.marker_expr }}'

          # Only mutate Catch-All
          if [[ '${{ matrix.batch_name }}' == 'Catch-All (Core Framework & Remaining Languages)' ]]; then
            # Ruby: ruby-lsp exists but can still crash; smoke-test it
            if command -v ruby-lsp >/dev/null 2>&1; then
              ruby-lsp --version >/dev/null 2>&1 || MARKERS="$MARKERS and not ruby"
            else
              MARKERS="$MARKERS and not ruby"
            fi

            # Zig (optional safety; keep if you want Catch-All resilient)
            if ! command -v zig >/dev/null 2>&1; then
              MARKERS="$MARKERS and not zig"
            fi

            # Swift (optional safety; sourcekit-lsp usually absent on linux containers)
            if ! command -v sourcekit-lsp >/dev/null 2>&1; then
              MARKERS="$MARKERS and not swift"
            fi
          fi

          echo "markers=$MARKERS" >> "$GITHUB_OUTPUT"
          echo "Final marker expression: $MARKERS"

      - name: Run Pytest Batch
        shell: bash
        run: |
          set -euxo pipefail
          .venv/bin/python -m pytest -m "${{ steps.markers.outputs.markers }}"