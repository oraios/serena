name: Parallel Matrix CI

on:
  push:
    branches:
      - feature/parallel-ci-workflows
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tirthpatel90/serena-maximal:latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - batch_name: 'Heavy Toolchains (C++, Rust, Java)'
            pytest_marker: '-m "cpp or rust or java"'
          
          - batch_name: 'Medium Toolchains (Go)'
            pytest_marker: '-m "go"'
          
          - batch_name: 'Catch-All (Core Framework & Remaining Languages)'
            # Clean filtering: selective testing of installed servers while isolating non-existent tools
            pytest_marker: '-m "not cpp and not rust and not java and not go and not elm and not r and not rego and not scala"'

    name: ${{ matrix.batch_name }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache language servers
        uses: actions/cache@v4
        with:
          path: ~/.serena/language_servers
          key: ls-cache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ls-cache-${{ runner.os }}-

      - name: Setup uv (Fast Python Package Manager)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Setup Virtual Environment & Install Dependencies
        run: |
          # Create a pristine environment inside the mounted runtime path
          uv venv
          # Install using modern pyproject.toml configuration without relying on legacy files
          uv pip install -e . pytest pytest-asyncio

      - name: Run Pytest Batch
        run: |
          # Enforce absolute path execution using the freshly built environment setup
          source .venv/bin/activate
          python3 -m pytest ${{ matrix.pytest_marker }}