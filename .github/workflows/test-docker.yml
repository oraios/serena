name: Test Maximal Docker Build

on:
  push:
    branches:
      - feature/optimize-docker-ci # Yeh sirf teri branch par chalega

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Free disk space (Zaruri hai warna server full ho jayega)
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          docker system prune -af || true

      - name: Build the Monster Maximal Image
        run: |
          echo "Building the maximal image. Let's go!"
          docker build -t serena-maximal -f Dockerfile.maximal .