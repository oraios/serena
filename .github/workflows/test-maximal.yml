name: Test with Maximal Image

on:
  push:
    branches:
      - feature/optimize-docker-ci
  workflow_dispatch:

# Added permissions block to resolve GitHub Advanced Security warning
permissions:
  contents: read

jobs:
  fast-docker-test:
    name: Linux Tests (Containerized)
    runs-on: ubuntu-latest
    
    # Execute the workflow directly inside the pre-built maximal container
    container:
      image: ghcr.io/tirthpatel90/serena-maximal:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Quick Workspace Sync
        shell: bash
        run: |
          # Perform a rapid workspace sync (bypasses heavy toolchain installations)
          uv sync --extra dev --locked
          uv pip list

      - name: Test with pytest (Optimized)
        shell: bash
        run: uv run poe test -q --tb=short

      - name: Type-checking with mypy
        shell: bash
        run: uv run poe type-check