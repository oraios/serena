name: Publish Maximal Docker Image

on:
  push:
    branches:
      - feature/optimize-docker-ci
  workflow_dispatch: # for manual run from GitHub UI

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    
    # permission to upload the image to GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.maximal
          push: true
          # this will tag the image as latest, you can also add more tags if needed
          tags: ghcr.io/tirthpatel90/serena-maximal:latest
          # Caching on for future runs, this will speed up the build process by reusing layers
          cache-from: type=gha
          cache-to: type=gha,mode=max